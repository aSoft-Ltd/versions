[versions]
# TestBalloon - DSL-based testing framework for Kotlin Multiplatform
testballoon = "0.8.0-K2.3.0"

[libraries]
# Core framework - required for all platforms
framework-core = { module = "de.infix.testBalloon:testBalloon-framework-core", version.ref = "testballoon" }

# Optional integrations
integration-kotest-assertions = { module = "de.infix.testBalloon:testBalloon-integration-kotest-assertions", version.ref = "testballoon" }
integration-blocking-detection = { module = "de.infix.testBalloon:testBalloon-integration-blocking-detection", version.ref = "testballoon" }

[plugins]
# TestBalloon Gradle plugin for test discovery and execution
testballoon = { id = "de.infix.testBalloon", version.ref = "testballoon" }
